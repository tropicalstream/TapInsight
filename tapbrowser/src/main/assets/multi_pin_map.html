<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TapInsight — Locations</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,'SF Pro',sans-serif;color:#fff}

/* ── Nuke Google Maps alpha developer warning overlay ── */
.dismissButton,
div[class*="dismissButton"],
div[class*="alpha"] > button,
div[style*="z-index"][style*="position: absolute"] > div > button,
.gm-style > div[style*="z-index: 1"] > div[style*="background-color: white"],
.gm-style > div[style*="z-index: 1"] > div[style*="background-color: rgb(255"],
div[style*="z-index"][style*="background-color: white"][style*="position"],
div[style*="z-index"][style*="background-color: rgb(255, 255, 255)"][style*="position"] {
  display:none !important;
  visibility:hidden !important;
  opacity:0 !important;
  pointer-events:none !important;
  height:0 !important;
  width:0 !important;
  overflow:hidden !important;
}

#map3d-container{width:100%;height:100%;position:absolute;top:0;left:0}
#map3d-container > *{width:100%;height:100%}

/* ── Quadrant pan zones ── */
#quadrant-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:5;pointer-events:none}
.quad-zone{position:absolute;pointer-events:auto;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s}
.quad-zone:active{opacity:1}
.quad-arrow{font-size:28px;color:rgba(0,255,255,0.6);text-shadow:0 0 12px rgba(0,255,255,0.4)}
#quad-up{top:0;left:20%;right:20%;height:22%}
#quad-down{bottom:0;left:20%;right:20%;height:22%}
#quad-left{left:0;top:20%;bottom:20%;width:18%}
#quad-right{right:0;top:20%;bottom:20%;width:18%}

/* ── Zoom + mode controls ── */
#map-controls{position:fixed;top:12px;left:12px;z-index:10;display:flex;flex-direction:column;gap:6px}
#zoom-controls{display:flex;flex-direction:column;gap:4px}
#zoom-controls button{
  width:38px;height:38px;border:none;border-radius:10px;
  font-size:22px;font-weight:700;cursor:pointer;
  background:rgba(0,0,0,0.75);color:#00FFFF;
  border:1px solid rgba(0,255,255,0.3);
}
#zoom-controls button:active{background:rgba(0,255,255,0.2)}
#zoom-controls button:disabled{opacity:0.3;pointer-events:none}

/* ── Legend panel ── */
#legend {
  position:fixed; bottom:12px; right:12px; z-index:10;
  background:rgba(10,10,10,0.88); border:1px solid #333; border-radius:10px;
  padding:10px 12px; max-width:280px; max-height:45vh; overflow-y:auto;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}
#legend::-webkit-scrollbar{width:4px}
#legend::-webkit-scrollbar-thumb{background:#555;border-radius:2px}
.leg-title{
  color:#00E5FF;font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.5px;padding:2px 6px 6px;border-bottom:1px solid #333;margin-bottom:4px;
}
.leg-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 6px;border-radius:6px;cursor:pointer;
  transition:background 0.15s;
}
.leg-item:hover,.leg-item.active{background:rgba(0,229,255,0.12)}
.leg-pin{
  flex-shrink:0;width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:12px;font-weight:700;
}
.leg-info{flex:1;min-width:0}
.leg-name{color:#eee;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.leg-addr{color:#888;font-size:11px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

#fatal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#111;color:#f44;font-size:16px;align-items:center;justify-content:center;text-align:center;padding:20px;z-index:100}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;text-align:center}
#loading p{color:#00FFFF;font-size:16px;font-weight:600;margin-top:12px}
.spinner{width:44px;height:44px;border:3px solid rgba(0,255,255,0.2);border-top-color:#00FFFF;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="map3d-container"></div>

<!-- Quadrant tap zones for panning -->
<div id="quadrant-overlay">
  <div class="quad-zone" id="quad-up" onclick="panMap('up')"><span class="quad-arrow">▲</span></div>
  <div class="quad-zone" id="quad-down" onclick="panMap('down')"><span class="quad-arrow">▼</span></div>
  <div class="quad-zone" id="quad-left" onclick="panMap('left')"><span class="quad-arrow">◀</span></div>
  <div class="quad-zone" id="quad-right" onclick="panMap('right')"><span class="quad-arrow">▶</span></div>
</div>

<div id="map-controls">
  <div id="zoom-controls">
    <button id="zoom-in" type="button" onclick="zoomMap('in')">+</button>
    <button id="zoom-out" type="button" onclick="zoomMap('out')">−</button>
  </div>
</div>

<div id="legend"></div>
<div id="fatal"></div>
<div id="loading"><div class="spinner"></div><p>Loading 3D map…</p></div>

<script>
// ── Parse URL params ──
var params = new URLSearchParams(window.location.search);
var apiKey = params.get('gkey') || '';
var locationsRaw = params.get('locations') || '[]';
var userLat = parseFloat(params.get('lat')) || 0;
var userLng = parseFloat(params.get('lng')) || 0;

var PIN_COLORS = [
  '#E53935','#1E88E5','#43A047','#FB8C00','#8E24AA',
  '#00ACC1','#D81B60','#FFB300','#5E35B1','#00897B'
];

var locations = [];
try { locations = JSON.parse(locationsRaw); } catch(e) {
  try { locations = JSON.parse(decodeURIComponent(locationsRaw)); } catch(e2) {}
}

var map3d, Marker3DElement;
var currentRange = 2000;
var currentHeading = 0;
var currentTilt = 50;
var currentCenter = null;
var MIN_RANGE = 80;
var MAX_RANGE = 50000;

function showFatal(msg) {
  document.getElementById('loading').style.display = 'none';
  var el = document.getElementById('fatal');
  el.style.display = 'flex';
  el.innerHTML = msg;
}

function setLoading(msg) {
  var el = document.getElementById('loading');
  if (el) el.querySelector('p').textContent = msg;
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toRad(deg) { return deg * Math.PI / 180; }

// ── Zoom ──
function updateZoomButtons() {
  var zi = document.getElementById('zoom-in');
  var zo = document.getElementById('zoom-out');
  if (zi) zi.disabled = currentRange <= MIN_RANGE + 0.01;
  if (zo) zo.disabled = currentRange >= MAX_RANGE - 0.01;
}

window.__arNavZoom = function(direction) {
  if (!map3d || !currentCenter) return;
  currentRange = direction === 'in'
    ? Math.max(MIN_RANGE, currentRange * 0.65)
    : Math.min(MAX_RANGE, currentRange * 1.55);
  try {
    map3d.flyCameraTo({
      endCamera: {
        center: { lat: currentCenter.lat, lng: currentCenter.lng, altitude: 0 },
        range: currentRange, heading: currentHeading, tilt: currentTilt
      },
      durationMillis: 500
    });
  } catch(e) {
    try { map3d.range = currentRange; } catch(e2) {}
  }
  updateZoomButtons();
};
function zoomMap(d) { window.__arNavZoom(d); }

// ── Pan (quadrant taps) ──
var PAN_FRACTION = 0.25;
function panMap(direction) {
  if (!map3d || !currentCenter) return;
  var panDeg = currentRange * 0.0000045 * PAN_FRACTION;
  var lat = currentCenter.lat, lng = currentCenter.lng;
  var hr = toRad(currentHeading);
  switch(direction) {
    case 'up':    lat += panDeg * Math.cos(hr); lng += panDeg * Math.sin(hr); break;
    case 'down':  lat -= panDeg * Math.cos(hr); lng -= panDeg * Math.sin(hr); break;
    case 'left':  lat += panDeg * Math.sin(hr); lng -= panDeg * Math.cos(hr); break;
    case 'right': lat -= panDeg * Math.sin(hr); lng += panDeg * Math.cos(hr); break;
  }
  currentCenter = { lat: lat, lng: lng };
  try {
    map3d.flyCameraTo({
      endCamera: { center: { lat: lat, lng: lng, altitude: 0 }, range: currentRange, heading: currentHeading, tilt: currentTilt },
      durationMillis: 600
    });
  } catch(e) {
    try { map3d.center = { lat: lat, lng: lng, altitude: 0 }; } catch(e2) {}
  }
}

// ── Focus on a legend location ──
function focusLocation(index) {
  var loc = locations[index];
  if (!map3d || !loc._latlng) return;
  currentCenter = { lat: loc._latlng.lat, lng: loc._latlng.lng };
  currentRange = 800;
  try {
    map3d.flyCameraTo({
      endCamera: { center: { lat: loc._latlng.lat, lng: loc._latlng.lng, altitude: 0 }, range: 800, heading: currentHeading, tilt: 55 },
      durationMillis: 800
    });
  } catch(e) {
    map3d.center = { lat: loc._latlng.lat, lng: loc._latlng.lng, altitude: 0 };
    map3d.range = 800;
  }
  updateZoomButtons();
  document.querySelectorAll('.leg-item').forEach(function(el, i) {
    el.classList.toggle('active', i === index);
  });
}

function buildLegend() {
  var legend = document.getElementById('legend');
  legend.innerHTML = '<div class="leg-title">Locations</div>';
  locations.forEach(function(loc, i) {
    var color = PIN_COLORS[i % PIN_COLORS.length];
    var item = document.createElement('div');
    item.className = 'leg-item';
    item.onclick = function() { focusLocation(i); };
    item.innerHTML =
      '<div class="leg-pin" style="background:' + color + '">' + (i+1) + '</div>' +
      '<div class="leg-info">' +
        '<div class="leg-name">' + escHtml(loc.name || ('Location ' + (i+1))) + '</div>' +
        (loc.address ? '<div class="leg-addr">' + escHtml(loc.address) + '</div>' : '') +
      '</div>';
    legend.appendChild(item);
  });
}

async function init() {
  try {
    setLoading('Loading 3D map…');
    var maps3dLib = await google.maps.importLibrary('maps3d');
    var Map3DElement = maps3dLib.Map3DElement;
    Marker3DElement = maps3dLib.Marker3DElement;

    // ── Find locations via Places text search ──
    var userPos = (userLat && userLng) ? new google.maps.LatLng(userLat, userLng) : null;
    var placesDiv = document.createElement('div');
    var placesService = new google.maps.places.PlacesService(placesDiv);

    var searchPromises = locations.map(function(loc) {
      return new Promise(function(resolve) {
        var query = '';
        if (loc.name && loc.address) query = loc.name + ', ' + loc.address;
        else query = loc.name || loc.address || '';
        var request = { query: query };
        if (userPos) { request.location = userPos; request.radius = 20000; }
        placesService.textSearch(request, function(results, status) {
          if (status === google.maps.places.PlacesServiceStatus.OK && results[0]) {
            var pos = results[0].geometry.location;
            loc._latlng = { lat: pos.lat(), lng: pos.lng() };
            if (!loc.name && results[0].name) loc.name = results[0].name;
          }
          resolve();
        });
      });
    });

    setLoading('Finding locations…');
    await Promise.all(searchPromises);

    var validLocs = locations.filter(function(l) { return l._latlng; });
    if (validLocs.length === 0) {
      showFatal('Could not find any of the locations on the map.');
      return;
    }

    // ── Compute bounds center and camera range ──
    var minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
    validLocs.forEach(function(l) {
      if (l._latlng.lat < minLat) minLat = l._latlng.lat;
      if (l._latlng.lat > maxLat) maxLat = l._latlng.lat;
      if (l._latlng.lng < minLng) minLng = l._latlng.lng;
      if (l._latlng.lng > maxLng) maxLng = l._latlng.lng;
    });
    var centerLat = (minLat + maxLat) / 2;
    var centerLng = (minLng + maxLng) / 2;
    var latSpreadKm = (maxLat - minLat) * 111;
    var lngSpreadKm = (maxLng - minLng) * 111 * Math.cos(centerLat * Math.PI / 180);
    var spreadKm = Math.max(latSpreadKm, lngSpreadKm);
    currentRange = Math.max(1000, spreadKm * 1200);
    if (validLocs.length === 1) currentRange = 1200;
    currentCenter = { lat: centerLat, lng: centerLng };

    setLoading('Rendering 3D map…');

    // ── Create 3D photorealistic map ──
    map3d = new Map3DElement({
      center: { lat: centerLat, lng: centerLng, altitude: 0 },
      range: currentRange,
      heading: currentHeading,
      tilt: currentTilt,
      mode: 'SATELLITE'
    });
    document.getElementById('map3d-container').appendChild(map3d);
    updateZoomButtons();

    // Wait for tiles
    await new Promise(function(resolve) {
      map3d.addEventListener('gmp-steadychange', function handler() {
        map3d.removeEventListener('gmp-steadychange', handler);
        resolve();
      });
      setTimeout(resolve, 5000);
    });

    // ── Place 3D markers ──
    validLocs.forEach(function(loc, i) {
      try {
        var marker = new Marker3DElement({
          position: { lat: loc._latlng.lat, lng: loc._latlng.lng, altitude: 25 },
          label: String(i + 1),
          altitudeMode: 'RELATIVE_TO_GROUND',
          extruded: true
        });
        map3d.appendChild(marker);
        marker.addEventListener('gmp-click', function() { focusLocation(i); });
      } catch(e) { console.warn('Marker3D failed for ' + i, e); }
    });

    document.getElementById('loading').style.display = 'none';
    buildLegend();

  } catch(e) {
    showFatal('3D Map failed: ' + (e.message || e));
  }
}

function initMap() { init(); }

// ── Load Google Maps JS API ──
if (!apiKey) {
  showFatal('Google Maps API key missing');
} else if (locations.length === 0) {
  showFatal('No locations provided');
} else {
  buildLegend();
  var s = document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key=' +
          encodeURIComponent(apiKey) + '&libraries=places&v=alpha&callback=initMap';
  s.async = true; s.defer = true;
  s.onerror = function() { showFatal('Failed to load Google Maps API.'); };
  document.head.appendChild(s);
  setTimeout(function() { if (!map3d) showFatal('Map timed out. Check Maps JavaScript API is enabled.'); }, 15000);
}

// ── Auto-dismiss Maps alpha developer warning overlay ──
(function() {
  var dismissed = false;
  function nukeWarnings() {
    if (dismissed) return;
    var allBtns = document.querySelectorAll('button');
    for (var i = 0; i < allBtns.length; i++) {
      var btn = allBtns[i];
      var txt = (btn.textContent || '').trim().toLowerCase();
      var cls = (btn.className || '').toLowerCase();
      var ariaLabel = (btn.getAttribute('aria-label') || '').toLowerCase();
      if (txt === 'dismiss' || txt === 'ok' || txt === 'close' || txt === 'got it' || txt === 'accept' ||
          ariaLabel === 'close' || ariaLabel === 'dismiss' ||
          cls.indexOf('dismiss') !== -1 || cls.indexOf('close') !== -1) {
        btn.click(); dismissed = true; return;
      }
    }
    var allDivs = document.querySelectorAll('div[style]');
    for (var d = 0; d < allDivs.length; d++) {
      var div = allDivs[d];
      var style = div.getAttribute('style') || '';
      var divText = (div.textContent || '').toLowerCase();
      if (style.indexOf('z-index') !== -1 && style.indexOf('position') !== -1 &&
          (divText.indexOf('development') !== -1 || divText.indexOf('experimental') !== -1 ||
           divText.indexOf('alpha') !== -1) && divText.length < 500) {
        div.style.display = 'none';
        var innerBtn = div.querySelector('button');
        if (innerBtn) innerBtn.click();
        dismissed = true; return;
      }
    }
    // Probe shadow DOM of gmp-map-3d
    var map3dEl = document.querySelector('gmp-map-3d');
    if (map3dEl && map3dEl.shadowRoot) {
      var shadowBtns = map3dEl.shadowRoot.querySelectorAll('button');
      for (var sb = 0; sb < shadowBtns.length; sb++) {
        var sbtxt = (shadowBtns[sb].textContent || '').trim().toLowerCase();
        var sbcls = (shadowBtns[sb].className || '').toLowerCase();
        if (sbtxt === 'dismiss' || sbtxt === 'ok' || sbtxt === 'close' || sbtxt === 'got it' ||
            sbcls.indexOf('dismiss') !== -1) {
          shadowBtns[sb].click(); dismissed = true; return;
        }
      }
      var shadowDivs = map3dEl.shadowRoot.querySelectorAll('div');
      for (var sd = 0; sd < shadowDivs.length; sd++) {
        var sdtxt = (shadowDivs[sd].textContent || '').toLowerCase();
        if ((sdtxt.indexOf('experimental') !== -1 || sdtxt.indexOf('development') !== -1 ||
             sdtxt.indexOf('alpha') !== -1 || sdtxt.indexOf('developer') !== -1) && sdtxt.length < 500) {
          shadowDivs[sd].style.display = 'none';
          var sdBtn = shadowDivs[sd].querySelector('button');
          if (sdBtn) sdBtn.click();
          dismissed = true; return;
        }
      }
    }
  }
  var observer = new MutationObserver(function() { if (!dismissed) nukeWarnings(); });
  observer.observe(document.body, { childList: true, subtree: true });
  var attempts = 0;
  var interval = setInterval(function() {
    attempts++;
    nukeWarnings();
    if (dismissed || attempts >= 100) clearInterval(interval);
  }, 300);
})();
</script>
</body></html>
