<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720,height=960,initial-scale=1,user-scalable=no">
<title>AR Nav</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:720px;height:960px;overflow:hidden;background:#000;font-family:'SF Pro','Helvetica Neue',Arial,sans-serif;color:#fff}

/* ── Nuke Google Maps alpha developer warning overlay ── */
.dismissButton,
div[class*="dismissButton"],
div[class*="alpha"] > button,
div[style*="z-index"][style*="position: absolute"] > div > button,
.gm-style > div[style*="z-index: 1"] > div[style*="background-color: white"],
.gm-style > div[style*="z-index: 1"] > div[style*="background-color: rgb(255"],
div[style*="z-index"][style*="background-color: white"][style*="position"],
div[style*="z-index"][style*="background-color: rgb(255, 255, 255)"][style*="position"] {
  display:none !important;
  visibility:hidden !important;
  opacity:0 !important;
  pointer-events:none !important;
  height:0 !important;
  width:0 !important;
  overflow:hidden !important;
}

/* ── 3D Map fills the viewport ── */
#map3d-container{width:100%;height:100%;position:absolute;top:0;left:0}
gmp-map-3d{width:100%;height:100%}

/* ── HUD overlay ── */
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}

/* Top bar — AR legibility: big bold text, strong glow */
#hud-top{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;
  background:linear-gradient(180deg,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0) 100%);
}
#hud-time{
  font-size:22px;font-weight:700;color:#00FFFF;
  text-shadow:0 0 10px rgba(0,255,255,0.8),0 0 20px rgba(0,255,255,0.4);
}
#hud-weather{
  font-size:18px;font-weight:600;color:#fff;
  text-shadow:0 0 8px rgba(255,255,255,0.5),0 1px 3px rgba(0,0,0,1);
}
#hud-aqi{
  font-size:15px;font-weight:700;padding:4px 12px;border-radius:10px;
  background:rgba(0,255,255,0.2);color:#00FFFF;
  text-shadow:0 0 8px rgba(0,255,255,0.6);
  border:1px solid rgba(0,255,255,0.3);
}

/* Destination bar with dismiss X */
#hud-dest{
  position:absolute;top:48px;left:12px;right:12px;
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:rgba(0,0,0,0.88);
  border:1px solid rgba(0,255,255,0.35);
  border-radius:14px;
  min-height:48px;
  pointer-events:auto;
  transition:opacity 0.3s, transform 0.3s;
}
#hud-dest.dismissed{opacity:0;transform:translateY(-20px);pointer-events:none}
#dest-icon{
  flex-shrink:0;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#FF6D00;
}
#dest-text{
  flex:1;font-size:18px;font-weight:700;color:#fff;
  line-height:1.3;
  text-shadow:0 0 6px rgba(255,255,255,0.3),0 1px 3px rgba(0,0,0,1);
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
#dest-dismiss{
  flex-shrink:0;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:700;color:rgba(255,255,255,0.6);
  cursor:pointer;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2);
  transition:background 0.2s;
}
#dest-dismiss:active{background:rgba(255,255,255,0.3)}

/* ETA bar at bottom — AR legibility */
#hud-bottom{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;justify-content:space-around;align-items:center;
  padding:14px 16px;
  background:linear-gradient(0deg,rgba(0,0,0,0.92) 0%,rgba(0,0,0,0) 100%);
}
.eta-box{text-align:center}
.eta-label{
  font-size:13px;font-weight:600;color:rgba(255,255,255,0.6);
  text-transform:uppercase;letter-spacing:1.5px;
  text-shadow:0 1px 3px rgba(0,0,0,1);
}
.eta-value{
  font-size:26px;font-weight:800;color:#fff;margin-top:2px;
  text-shadow:0 0 8px rgba(255,255,255,0.4),0 1px 4px rgba(0,0,0,1);
}
.eta-value.drive{
  color:#00FFFF;
  text-shadow:0 0 12px rgba(0,255,255,0.7),0 0 24px rgba(0,255,255,0.3);
}

/* Parking list — AR legibility */
#hud-parking{
  position:absolute;bottom:68px;right:12px;
  max-width:220px;
  font-size:14px;font-weight:600;color:rgba(0,255,255,0.9);
  text-align:right;
  line-height:1.8;
  text-shadow:0 0 6px rgba(0,255,255,0.5),0 1px 3px rgba(0,0,0,1);
}
#hud-parking .parking-title{
  font-size:12px;font-weight:700;color:rgba(255,255,255,0.5);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;
}
#candidate-list{
  position:absolute;left:12px;bottom:82px;max-width:310px;max-height:250px;overflow-y:auto;
  padding:8px;background:rgba(0,0,0,0.84);border:1px solid rgba(0,255,255,0.22);
  border-radius:14px;pointer-events:auto;display:none;
  box-shadow:0 8px 18px rgba(0,0,0,0.35);
}
#candidate-list.visible{display:block}
#candidate-list .candidate-title{
  color:rgba(255,255,255,0.65);font-size:11px;font-weight:700;letter-spacing:1.2px;
  text-transform:uppercase;padding:2px 6px 8px;
}
#candidate-list .candidate-item{
  display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;cursor:pointer;
  border:1px solid transparent;transition:background 0.15s,border-color 0.15s;
}
#candidate-list .candidate-item + .candidate-item{margin-top:4px}
#candidate-list .candidate-item.active{background:rgba(0,255,255,0.12);border-color:rgba(0,255,255,0.25)}
#candidate-list .candidate-item:active{background:rgba(0,255,255,0.18)}
#candidate-list .candidate-index{
  width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:rgba(0,255,255,0.2);color:#00FFFF;font-size:12px;font-weight:700;flex-shrink:0;
}
#candidate-list .candidate-copy{min-width:0;flex:1}
#candidate-list .candidate-name{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#candidate-list .candidate-address{font-size:11px;color:rgba(255,255,255,0.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

/* ── Quadrant tap zones ── */
#quadrant-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;z-index:8;
  pointer-events:none;
}
.quad-zone{
  position:absolute;pointer-events:auto;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.quad-zone:active{background:rgba(0,255,255,0.08)}
.quad-zone .quad-arrow{
  font-size:28px;color:rgba(0,255,255,0.15);
  text-shadow:0 0 10px rgba(0,255,255,0.1);
  pointer-events:none;
  transition:color 0.15s;
}
.quad-zone:active .quad-arrow{color:rgba(0,255,255,0.5)}
/* Top quadrant */
#quad-up{top:0;left:20%;width:60%;height:35%}
/* Bottom quadrant */
#quad-down{bottom:0;left:20%;width:60%;height:30%}
/* Left quadrant */
#quad-left{top:20%;left:0;width:25%;height:60%}
/* Right quadrant */
#quad-right{top:20%;right:0;width:25%;height:60%}

/* ── Map controls ── */
#map-controls{
  position:absolute;top:105px;right:12px;z-index:15;
  display:flex;align-items:flex-start;gap:10px;
  pointer-events:auto;
}

/* ── Night/Dark mode toggle button ── */
#mode-toggle{
  position:static;
  width:40px;height:40px;
  border-radius:50%;
  border:1.5px solid rgba(0,255,255,0.4);
  background:rgba(0,0,0,0.7);
  color:#00FFFF;
  font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  text-shadow:0 0 8px rgba(0,255,255,0.6);
  transition:background 0.2s, border-color 0.2s;
}
#mode-toggle:active{background:rgba(0,255,255,0.25)}
#mode-toggle.night-active{
  background:rgba(30,30,60,0.85);
  border-color:rgba(100,100,255,0.5);
  color:#aab;
}
#mode-toggle.dark-active{
  background:rgba(0,0,0,0.9);
  border-color:rgba(255,100,0,0.5);
  color:#FF6D00;
}

/* Google-like zoom control stack */
#zoom-controls{
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border-radius:12px;
  background:rgba(255,255,255,0.96);
  box-shadow:0 2px 8px rgba(0,0,0,0.35);
  border:1px solid rgba(0,0,0,0.12);
}
#zoom-controls button{
  width:40px;
  height:40px;
  border:0;
  background:transparent;
  color:#202124;
  font-size:24px;
  font-weight:500;
  line-height:1;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:background 0.15s,color 0.15s;
}
#zoom-controls button + button{
  border-top:1px solid rgba(32,33,36,0.14);
}
#zoom-controls button:active{
  background:rgba(60,64,67,0.12);
}
#zoom-controls button:disabled{
  color:rgba(95,99,104,0.45);
  background:rgba(255,255,255,0.78);
  cursor:default;
}

/* Map filter modes */
#map3d-container.night-mode{
  filter:brightness(0.55) saturate(0.3) hue-rotate(15deg);
}
#map3d-container.dark-mode{
  filter:invert(1) hue-rotate(180deg) brightness(0.9) saturate(0.4) contrast(1.1);
}
/* Keep HUD readable in dark/night mode — applied to HUD overlay */
body.night-mode-body #hud{ filter:none; }
body.dark-mode-body #hud{ filter:none; }

/* Loading overlay */
#loading{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#000;z-index:100;
  transition:opacity 0.5s;
}
#loading.hidden{opacity:0;pointer-events:none}
#loading p{color:#00FFFF;font-size:18px;font-weight:600;margin-top:12px;text-shadow:0 0 10px rgba(0,255,255,0.5)}
.spinner{width:44px;height:44px;border:3px solid rgba(0,255,255,0.2);border-top-color:#00FFFF;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="map3d-container"></div>

<!-- Quadrant tap zones for panning -->
<div id="quadrant-overlay">
  <div class="quad-zone" id="quad-up" onclick="panMap('up')"><span class="quad-arrow">▲</span></div>
  <div class="quad-zone" id="quad-down" onclick="panMap('down')"><span class="quad-arrow">▼</span></div>
  <div class="quad-zone" id="quad-left" onclick="panMap('left')"><span class="quad-arrow">◀</span></div>
  <div class="quad-zone" id="quad-right" onclick="panMap('right')"><span class="quad-arrow">▶</span></div>
</div>

<div id="map-controls">
  <div id="mode-toggle" onclick="cycleMapMode()">☀</div>
  <div id="zoom-controls" aria-label="Map zoom controls">
    <button id="zoom-in" type="button" aria-label="Zoom in" onclick="zoomMap('in')">+</button>
    <button id="zoom-out" type="button" aria-label="Zoom out" onclick="zoomMap('out')">−</button>
  </div>
</div>

<div id="hud">
  <div id="hud-top">
    <div id="hud-time">--:--</div>
    <div id="hud-weather">--</div>
    <div id="hud-aqi">AQI --</div>
  </div>
  <div id="hud-dest">
    <div id="dest-icon">📍</div>
    <div id="dest-text">Loading route…</div>
    <div id="dest-dismiss" onclick="closeNavToDashboard()">✕</div>
  </div>
  <div id="hud-bottom">
    <div class="eta-box"><div class="eta-label">Drive</div><div class="eta-value drive" id="eta-drive">--</div></div>
    <div class="eta-box"><div class="eta-label">Distance</div><div class="eta-value" id="eta-distance">--</div></div>
    <div class="eta-box"><div class="eta-label">Walk</div><div class="eta-value" id="eta-walk">--</div></div>
  </div>
  <div id="candidate-list"></div>
  <div id="hud-parking"></div>
</div>
<div id="loading"><div class="spinner"></div><p>Loading 3D route…</p></div>

<script>
// ── Parse URL params ──
var params  = new URLSearchParams(window.location.search);
var destAddr = params.get('dest') || '1600 Amphitheatre Parkway, Mountain View, CA';
var searchTopic = params.get('search') || '';
var apiKey   = params.get('gkey') || '';
var userLat  = parseFloat(params.get('lat') || '0');
var userLng  = parseFloat(params.get('lng') || '0');
var originLocked = params.get('origin_locked') === '1';
var returnUrl = params.get('return_url') || '';
var locationsRaw = params.get('locations') || '[]';
var activeLocationIndex = parseInt(params.get('selected') || '-1', 10);
var candidateLocations = [];
try { candidateLocations = JSON.parse(locationsRaw); } catch (e) {
  try { candidateLocations = JSON.parse(decodeURIComponent(locationsRaw)); } catch (e2) {}
}

var map3d, userCoords, destCoords;
var authFailed = false;
var currentRange = 500;    // current camera range (meters)
var currentHeading = 0;    // current camera heading (degrees)
var currentTilt = 55;      // current camera tilt
var currentCenter = null;  // current camera center {lat, lng}
var cachedRoute = null;         // stored route object for re-rendering labels on zoom
var cachedRouteCoords = [];     // stored route polyline coords
var roadLabelMarkers = [];      // current road label markers on map
var poiMarkers = [];            // current POI markers on map
var Marker3DElement = null;     // stored reference to Marker3DElement constructor
var mapDisplayMode = 'day';     // 'day' | 'night' | 'dark'
var MIN_RANGE = 80;
var MAX_RANGE = 50000;

// ── Cycle map display mode: Day → Night → Dark → Day ──
function cycleMapMode() {
  var container = document.getElementById('map3d-container');
  var btn = document.getElementById('mode-toggle');
  container.classList.remove('night-mode', 'dark-mode');
  document.body.classList.remove('night-mode-body', 'dark-mode-body');
  btn.classList.remove('night-active', 'dark-active');

  if (mapDisplayMode === 'day') {
    mapDisplayMode = 'night';
    container.classList.add('night-mode');
    document.body.classList.add('night-mode-body');
    btn.classList.add('night-active');
    btn.textContent = '🌙';
  } else if (mapDisplayMode === 'night') {
    mapDisplayMode = 'dark';
    container.classList.add('dark-mode');
    document.body.classList.add('dark-mode-body');
    btn.classList.add('dark-active');
    btn.textContent = '🌑';
  } else {
    mapDisplayMode = 'day';
    btn.textContent = '☀';
  }
  console.log('[ARNav] Map mode:', mapDisplayMode);
}

function updateZoomButtons() {
  var zoomIn = document.getElementById('zoom-in');
  var zoomOut = document.getElementById('zoom-out');
  if (!zoomIn || !zoomOut) return;
  zoomIn.disabled = currentRange <= MIN_RANGE + 0.01;
  zoomOut.disabled = currentRange >= MAX_RANGE - 0.01;
}

function extractDestinationSearchTopic(raw) {
  var clean = String(raw || '').replace(/\s+/g, ' ').trim();
  clean = clean.replace(/^→\s*/, '');
  var firstAddressIdx = clean.search(/\b\d{1,5}\s+[A-Za-z0-9.'#\- ]+\s(?:St|Street|Ave|Avenue|Blvd|Boulevard|Rd|Road|Dr|Drive|Ln|Lane|Way|Pl|Place|Ct|Court|Pkwy|Parkway|Ter|Terrace)\b/i);
  if (firstAddressIdx > 0) {
    clean = clean.substring(0, firstAddressIdx).trim();
  }
  clean = clean
    .replace(/\baddress:\s*/i, '')
    .replace(/(?:is\s+)?(?:located|location)\s+at\s+.*$/i, '')
    .replace(/\bis\s+at\s+.*$/i, '')
    .replace(/[—|-].*$/, '')
    .trim();
  return clean || cleanDestinationQuery(raw);
}

function buildCandidateDestination(loc) {
  var name = String((loc && loc.name) || '').trim();
  var address = String((loc && loc.address) || '').trim();
  if (name && address && address.toLowerCase().indexOf(name.toLowerCase()) === -1) {
    return name + ', ' + address;
  }
  return address || name;
}

function renderCandidateList() {
  var panel = document.getElementById('candidate-list');
  if (!panel) return;
  if (!candidateLocations || candidateLocations.length <= 1) {
    panel.classList.remove('visible');
    panel.innerHTML = '';
    return;
  }
  var html = '<div class="candidate-title">Other Locations</div>';
  candidateLocations.forEach(function(loc, index) {
    var name = String((loc && loc.name) || ('Location ' + (index + 1))).trim();
    var address = String((loc && loc.address) || '').trim();
    var active = index === activeLocationIndex ? ' active' : '';
    html += '<div class="candidate-item' + active + '" onclick="switchToCandidate(' + index + ')">' +
      '<div class="candidate-index">' + (index + 1) + '</div>' +
      '<div class="candidate-copy">' +
        '<div class="candidate-name">' + escHtml(name) + '</div>' +
        (address ? '<div class="candidate-address">' + escHtml(address) + '</div>' : '') +
      '</div>' +
    '</div>';
  });
  panel.innerHTML = html;
  panel.classList.add('visible');
}

function switchToCandidate(index) {
  if (!candidateLocations || !candidateLocations[index]) return;
  var loc = candidateLocations[index];
  var dest = buildCandidateDestination(loc);
  if (!dest) return;
  var search = String((loc.name || searchTopic || dest) || '').trim();
  var nextUrl = 'file:///android_asset/ar_nav.html' +
    '?dest=' + encodeURIComponent(dest) +
    '&search=' + encodeURIComponent(search) +
    '&gkey=' + encodeURIComponent(apiKey) +
    '&lat=' + encodeURIComponent(String(userLat || 0)) +
    '&lng=' + encodeURIComponent(String(userLng || 0)) +
    '&origin_locked=' + (originLocked ? '1' : '0') +
    '&return_url=' + encodeURIComponent(returnUrl || '') +
    '&locations=' + encodeURIComponent(JSON.stringify(candidateLocations)) +
    '&selected=' + index;
  try {
    window.location.replace(nextUrl);
  } catch (e) {
    window.location.href = nextUrl;
  }
}

// ── Close AR nav and search for the destination topic ──
function closeNavToDashboard() {
  if (returnUrl) {
    try {
      window.location.replace(returnUrl);
      return;
    } catch (e) {
      window.location.href = returnUrl;
      return;
    }
  }
  var topic = (searchTopic || '').trim();
  if (!topic) topic = extractDestinationSearchTopic(destAddr);
  var target = 'https://www.google.com/search?q=' + encodeURIComponent(topic || cleanDestinationQuery(destAddr));
  try {
    window.location.replace(target);
  } catch (e) {
    window.location.href = target;
  }
}

// ══════════════════════════════════════════════════
// ── QUADRANT TAP → PAN ──
// ══════════════════════════════════════════════════
var PAN_FRACTION = 0.25; // pan 25% of current view per tap

function panMap(direction) {
  if (!map3d || !currentCenter) return;
  // Calculate pan distance in degrees based on range
  // At range R meters, roughly R * 0.000009 degrees per meter at equator
  var panDeg = currentRange * 0.0000045 * PAN_FRACTION;

  var lat = currentCenter.lat;
  var lng = currentCenter.lng;
  var headingRad = toRad(currentHeading);

  switch(direction) {
    case 'up':
      lat += panDeg * Math.cos(headingRad);
      lng += panDeg * Math.sin(headingRad);
      break;
    case 'down':
      lat -= panDeg * Math.cos(headingRad);
      lng -= panDeg * Math.sin(headingRad);
      break;
    case 'left':
      lat += panDeg * Math.sin(headingRad);
      lng -= panDeg * Math.cos(headingRad);
      break;
    case 'right':
      lat -= panDeg * Math.sin(headingRad);
      lng += panDeg * Math.cos(headingRad);
      break;
  }

  currentCenter = { lat: lat, lng: lng };
  try {
    map3d.flyCameraTo({
      endCamera: {
        center: { lat: lat, lng: lng, altitude: 0 },
        range: currentRange,
        heading: currentHeading,
        tilt: currentTilt
      },
      durationMillis: 600
    });
  } catch(e) {
    // Direct fallback
    try {
      map3d.center = { lat: lat, lng: lng, altitude: 0 };
    } catch(e2) {}
  }
  // Refresh POIs for new view center
  setTimeout(function() { refreshPOIs(); }, 700);
}

// ══════════════════════════════════════════════════
// ── ZOOM (called from TapBrowser side-menu buttons) ──
// ══════════════════════════════════════════════════
window.__arNavZoom = function(direction) {
  if (!map3d || !currentCenter) return;
  if (direction === 'in') {
    currentRange = Math.max(MIN_RANGE, currentRange * 0.65);
  } else {
    currentRange = Math.min(MAX_RANGE, currentRange * 1.55);
  }
  try {
    map3d.flyCameraTo({
      endCamera: {
        center: { lat: currentCenter.lat, lng: currentCenter.lng, altitude: 0 },
        range: currentRange,
        heading: currentHeading,
        tilt: currentTilt
      },
      durationMillis: 500
    });
  } catch(e) {
    try { map3d.range = currentRange; } catch(e2) {}
  }
  updateZoomButtons();
  // Re-render road labels and POIs after zoom settles
  setTimeout(function() { refreshRoadLabels(); refreshPOIs(); }, 700);
};

function zoomMap(direction) {
  window.__arNavZoom(direction);
}

// ── Re-render road labels at current zoom level ──
function refreshRoadLabels() {
  if (!map3d || !Marker3DElement || !cachedRoute) return;
  // Remove old road label markers
  for (var i = 0; i < roadLabelMarkers.length; i++) {
    try { roadLabelMarkers[i].remove(); } catch(e) {}
  }
  roadLabelMarkers = [];
  try {
    var labels = extractRoadLabels(cachedRoute);
    // At close zoom (<1km range), show ALL labels; at far zoom filter to major roads
    var filtered = labels;
    if (currentRange > 3000) {
      // Only show highways/freeways/major roads at far zoom
      filtered = labels.filter(function(l) {

}

// ── Geo utilities ──
function toRad(deg) { return deg * Math.PI / 180; }
function toDeg(rad) { return rad * 180 / Math.PI; }

function distanceM(a, b) {
  var R = 6371000;
  var dLat = toRad(b.lat - a.lat);
  var dLng = toRad(b.lng - a.lng);
  var sin1 = Math.sin(dLat/2), sin2 = Math.sin(dLng/2);
  var h = sin1*sin1 + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*sin2*sin2;
  return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
}

function bearingDeg(a, b) {
  var dLng = toRad(b.lng - a.lng);
  var y = Math.sin(dLng) * Math.cos(toRad(b.lat));
  var x = Math.cos(toRad(a.lat)) * Math.sin(toRad(b.lat)) -
          Math.sin(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.cos(dLng);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function formatDist(meters) {
  if (meters < 160) return Math.round(meters) + ' ft';
  if (meters < 1609) return Math.round(meters * 3.281 / 100) * 100 + ' ft';
  return (meters / 1609.34).toFixed(1) + ' mi';
}

function formatDuration(seconds) {
  if (seconds < 60) return '< 1 min';
  if (seconds < 3600) return Math.round(seconds/60) + ' min';
  return (seconds/3600).toFixed(1) + ' hr';
}

// ── Compute bounding box center and range from a set of route coords ──
function computeRouteBounds(coords) {
  if (!coords || coords.length === 0) return null;
  var minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
  for (var i = 0; i < coords.length; i++) {
    var c = coords[i];
    if (c.lat < minLat) minLat = c.lat;
    if (c.lat > maxLat) maxLat = c.lat;
    if (c.lng < minLng) minLng = c.lng;
    if (c.lng > maxLng) maxLng = c.lng;
  }
  // Also include origin and destination
  if (userCoords) {
    if (userCoords.lat < minLat) minLat = userCoords.lat;
    if (userCoords.lat > maxLat) maxLat = userCoords.lat;
    if (userCoords.lng < minLng) minLng = userCoords.lng;
    if (userCoords.lng > maxLng) maxLng = userCoords.lng;
  }
  if (destCoords) {
    if (destCoords.lat < minLat) minLat = destCoords.lat;
    if (destCoords.lat > maxLat) maxLat = destCoords.lat;
    if (destCoords.lng < minLng) minLng = destCoords.lng;
    if (destCoords.lng > maxLng) maxLng = destCoords.lng;
  }
  var centerLat = (minLat + maxLat) / 2;
  var centerLng = (minLng + maxLng) / 2;
  // Calculate the diagonal distance of the bounding box
  var diagDist = distanceM({lat: minLat, lng: minLng}, {lat: maxLat, lng: maxLng});
  return {
    center: { lat: centerLat, lng: centerLng },
    diag: diagDist
  };
}

// ── Timeout-wrapped fetch ──
function fetchWithTimeout(url, opts, ms) {
  ms = ms || 8000;
  var ctrl = new AbortController();
  var timer = setTimeout(function(){ ctrl.abort(); }, ms);
  return fetch(url, Object.assign({}, opts, { signal: ctrl.signal })).finally(function(){ clearTimeout(timer); });
}

// ── Destination query cleaning ──
function cleanDestinationQuery(raw) {
  var clean = String(raw || '').replace(/\s+/g, ' ').replace(/^→\s*/, '').trim();
  var addressPattern = /\b\d{1,5}\s+[A-Za-z0-9.'#\- ]+\s(?:St|Street|Ave|Avenue|Blvd|Boulevard|Rd|Road|Dr|Drive|Ln|Lane|Way|Pl|Place|Ct|Court|Pkwy|Parkway|Ter|Terrace)\b(?:,\s*[A-Za-z .'-]+){0,3}/i;
  var directAddress = clean.match(addressPattern);
  if (directAddress) return directAddress[0].trim().replace(/[.,;:\s]+$/, '');
  var prefixedPatterns = [/\baddress:\s*(.+)/i, /(?:is\s+)?(?:located|location)\s+at\s+(.+)/i, /\bis\s+at\s+(.+)/i];
  for (var i=0; i<prefixedPatterns.length; i++) {
    var match = clean.match(prefixedPatterns[i]);
    if (match && match[1]) { clean = match[1].trim(); break; }
  }
  var imperative = clean.match(/^(?:find|visit|go\s+to|head\s+to|navigate\s+to|directions?\s+to)\s+(.+)$/i);
  if (imperative && imperative[1]) clean = imperative[1].trim();
  clean = clean
    .replace(/\b(?:currently\s+)?(?:open\s*now|openow|closed|closednow)\b.*$/i, '')
    .replace(/\b(?:clear|cloudy|overcast|rain|showers|fog|drizzle|snow|storm)\b.*$/i, '')
    .replace(/\bAQI\s*\d+.*$/i, '').replace(/\b\d{1,3}°\s*[FC]\b.*$/i, '')
    .replace(/\b(?:walk|drive|transit|eta|parking|traffic|weather|temperature)\b.*$/i, '')
    .replace(/\s+which\s+is\s+.*$/i, '').replace(/\s+in\s+/gi, ', ').trim();
  [' — ', ' - ', ' | ', '. '].forEach(function(sep) {
    var idx = clean.indexOf(sep);
    if (idx > 5) clean = clean.substring(0, idx);
  });
  var addressAfterTrim = clean.match(addressPattern);
  if (addressAfterTrim) return addressAfterTrim[0].trim().replace(/[.,;:\s]+$/, '');
  return clean.replace(/[.,;:\s]+$/, '');
}

// ── Extract unique road/highway names from route steps and place as 3D labels ──
// Snap a point to the nearest point on the route polyline
function snapToRoute(lat, lng) {
  if (!cachedRouteCoords || cachedRouteCoords.length === 0) return { lat: lat, lng: lng };
  var bestDist = Infinity;
  var bestPoint = cachedRouteCoords[0];
  for (var i = 0; i < cachedRouteCoords.length - 1; i++) {
    var p = closestPointOnSegment(lat, lng, cachedRouteCoords[i], cachedRouteCoords[i + 1]);
    var d = (p.lat - lat) * (p.lat - lat) + (p.lng - lng) * (p.lng - lng);
    if (d < bestDist) { bestDist = d; bestPoint = p; }
  }
  return bestPoint;
}

// Find closest point on line segment A→B to point P
function closestPointOnSegment(pLat, pLng, a, b) {
  var dx = b.lng - a.lng, dy = b.lat - a.lat;
  if (dx === 0 && dy === 0) return { lat: a.lat, lng: a.lng };
  var t = ((pLng - a.lng) * dx + (pLat - a.lat) * dy) / (dx * dx + dy * dy);
  t = Math.max(0, Math.min(1, t));
  return { lat: a.lat + t * dy, lng: a.lng + t * dx };
}

function extractRoadLabels(route) {
  var labels = [];
  if (!route || !route.legs) return labels;
  var seen = {};
  for (var li = 0; li < route.legs.length; li++) {
    var steps = route.legs[li].steps;
    if (!steps) continue;
    for (var si = 0; si < steps.length; si++) {
      var step = steps[si];
      var nav = step.navigationInstruction;
      if (!nav || !nav.instructions) continue;
      var roads = extractRoadNamesFromText(nav.instructions);
      for (var ri = 0; ri < roads.length; ri++) {
        var road = roads[ri];
        if (seen[road.toLowerCase()]) continue;
        seen[road.toLowerCase()] = true;
        // Get the step midpoint then snap it to the nearest point on the route polyline
        var rawLoc = null;
        if (step.startLocation && step.endLocation) {
          rawLoc = {
            lat: (step.startLocation.latLng.latitude + step.endLocation.latLng.latitude) / 2,
            lng: (step.startLocation.latLng.longitude + step.endLocation.latLng.longitude) / 2
          };
        } else if (step.startLocation) {
          rawLoc = { lat: step.startLocation.latLng.latitude, lng: step.startLocation.latLng.longitude };
        }
        if (rawLoc) {
          var snapped = snapToRoute(rawLoc.lat, rawLoc.lng);
          labels.push({ name: road, lat: snapped.lat, lng: snapped.lng });
        }
      }
    }
  }
  return labels;
}

function extractRoadNamesFromText(text) {
  var names = [];
  // Match road names: "onto X", "on X", "Continue on X", also highway patterns
  var patterns = [
    /\b(?:onto|on)\s+(.+?)(?:\s+toward|\s+for|\s*\/|\s*$)/gi,
    /\b(?:Take)\s+(.+?)(?:\s+toward|\s+to|\s+exit|\s*$)/gi,
    /\b(?:Merge onto)\s+(.+?)(?:\s+toward|\s+via|\s*$)/gi,
    /\b((?:I|US|CA|SR|Hwy|Interstate|Route)\s*[-–]?\s*\d+[A-Z]?(?:\s+[NSEW](?:orth|outh|ast|est)?)?)/gi
  ];
  for (var pi = 0; pi < patterns.length; pi++) {
    var m;
    while ((m = patterns[pi].exec(text)) !== null) {
      var name = m[1].trim()
        .replace(/\s*toward\s.*$/i, '')
        .replace(/\s*for\s.*$/i, '')
        .replace(/[.,;]+$/, '')
        .trim();
      if (name.length >= 2 && name.length <= 50) names.push(name);
    }
  }
  return names;
}

// ── MAIN INIT ──
// ══════════════════════════════════════════════════
async function init() {
  var safetyTimer = setTimeout(function() {
    console.error('[ARNav] SAFETY TIMEOUT — forcing loading screen off');
    hideLoading();
  }, 25000);

  try {
    console.log('[ARNav] init() dest="' + destAddr + '" lat=' + userLat + ' lng=' + userLng);
    var maps3dPromise = google.maps.importLibrary('maps3d');
    var userCoordsPromise;
    if (originLocked && userLat && userLng) {
      userCoordsPromise = Promise.resolve({ lat: userLat, lng: userLng });
    } else {
      userCoordsPromise = new Promise(function(resolve) {
        navigator.geolocation.getCurrentPosition(function(pos) {
          resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude });
        }, function() {
          if (userLat && userLng) {
            resolve({ lat: userLat, lng: userLng });
          } else {
            resolve(null);
          }
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 6000 });
      });
    }

    // ── Step 1: Geocode destination ──
    setLoading('Resolving destination…');
    destCoords = await geocode(destAddr);
    if (!destCoords) {
      clearTimeout(safetyTimer);
      showFatal('Could not find address:<br>' + destAddr.substring(0, 80));
      return;
    }

    // ── Step 2: Get user position ──
    userCoords = await userCoordsPromise;
    if (!userCoords) {
      if (userLat && userLng) {
        userCoords = {lat:userLat, lng:userLng};
      } else {
        userCoords = {lat: destCoords.lat + 0.003, lng: destCoords.lng + 0.005};
      }
    }

    document.getElementById('dest-text').textContent = destAddr;
    renderCandidateList();

    // ── Step 3: Fetch traffic-aware route ──
    setLoading('Computing route…');
    var route = null;
    var routeCoords = [];
    var legDuration = '--';
    var legDistance = '--';
    try {
      route = await fetchRoute(userCoords, destCoords);
      var leg = route.legs[0];
      var durationSec = parseInt(leg.duration.replace('s',''));
      legDuration = formatDuration(durationSec);
      legDistance = formatDist(leg.distanceMeters);
      routeCoords = decodeGeoJsonPolyline(route.polyline);
      cachedRoute = route;          // store globally for zoom re-render
      cachedRouteCoords = routeCoords;
      console.log('[ARNav] Route: ' + routeCoords.length + ' points, ' + legDistance + ', ' + legDuration);
    } catch(e) {
      console.error('[ARNav] Route fetch failed:', e);
      routeCoords = [userCoords, destCoords];
      legDuration = '—';
      legDistance = formatDist(distanceM(userCoords, destCoords));
    }

    document.getElementById('eta-drive').textContent = legDuration;
    document.getElementById('eta-distance').textContent = legDistance;

    // ── Step 4: Create 3D Map ──
    setLoading('Rendering 3D map…');
    var maps3dLib = await maps3dPromise;
    var Map3DElement = maps3dLib.Map3DElement;
    var Polyline3DElement = maps3dLib.Polyline3DElement;
    Marker3DElement = maps3dLib.Marker3DElement; // store globally for zoom re-render

    // Calculate optimal camera from route bounding box (not just origin/dest)
    var bounds = computeRouteBounds(routeCoords);
    var routeCenter, routeDist;
    if (bounds) {
      routeCenter = bounds.center;
      routeDist = bounds.diag;
    } else {
      routeCenter = { lat: (userCoords.lat + destCoords.lat) / 2, lng: (userCoords.lng + destCoords.lng) / 2 };
      routeDist = distanceM(userCoords, destCoords);
    }

    // Range: scale with route diagonal, with padding to ensure full route visible
    // The 3D camera "range" is distance from camera to center point
    // Need extra range to account for tilt (camera is angled, not top-down)
    var tiltFactor = 1.6; // compensate for 55° tilt cutting off the far edge
    currentRange = Math.max(300, Math.min(routeDist * tiltFactor, 30000));
    currentHeading = bearingDeg(userCoords, destCoords);
    currentCenter = routeCenter;
    currentTilt = 55;

    // For short routes (<1km), lower tilt for better overview
    if (routeDist < 1000) {
      currentTilt = 45;
      currentRange = Math.max(300, routeDist * 2.2);
    }

    map3d = new Map3DElement({
      center: { lat: currentCenter.lat, lng: currentCenter.lng, altitude: 0 },
      range: currentRange,
      heading: currentHeading,
      tilt: currentTilt,
      mode: 'SATELLITE'
    });

    document.getElementById('map3d-container').appendChild(map3d);
    updateZoomButtons();
    console.log('[ARNav] Map3DElement created, range=' + Math.round(currentRange) + ', heading=' + Math.round(currentHeading) + ', tilt=' + currentTilt + ', dist=' + Math.round(routeDist));

    // Wait briefly for the initial scene, but do not stall route rendering.
    await new Promise(function(resolve) {
      var settled = false;
      function finish() {
        if (settled) return;
        settled = true;
        try { map3d.removeEventListener('gmp-steadychange', onSteady); } catch (e) {}
        resolve();
      }
      function onSteady() { finish(); }
      try { map3d.addEventListener('gmp-steadychange', onSteady); } catch (e) {}
      setTimeout(finish, 1200);
    });

    // ── Step 5: Draw route polyline on 3D map ──
    if (routeCoords.length >= 2) {
      var hasTraffic = route && route.travelAdvisory && route.travelAdvisory.speedReadingIntervals;

      if (hasTraffic) {
        var intervals = route.travelAdvisory.speedReadingIntervals;
        for (var si = 0; si < intervals.length; si++) {
          var interval = intervals[si];
          var startIdx = interval.startPolylinePointIndex || 0;
          var endIdx = interval.endPolylinePointIndex || routeCoords.length - 1;
          if (endIdx >= routeCoords.length) endIdx = routeCoords.length - 1;
          if (startIdx >= routeCoords.length) continue;

          var segCoords = [];
          for (var k = startIdx; k <= endIdx; k++) {
            segCoords.push({ lat: routeCoords[k].lat, lng: routeCoords[k].lng, altitude: 25 });
          }
          if (segCoords.length < 2) continue;

          try {
            var segLine = new Polyline3DElement({
              strokeColor: trafficColor(interval.speed),
              strokeWidth: 12,
              altitudeMode: 'RELATIVE_TO_GROUND',
              coordinates: segCoords
            });
            map3d.append(segLine);
          } catch(pe) { console.warn('[ARNav] Traffic segment failed:', pe.message); }
        }
      } else {
        var lineCoords = routeCoords.map(function(c) {
          return { lat: c.lat, lng: c.lng, altitude: 25 };
        });
        try {
          var routeLine = new Polyline3DElement({
            strokeColor: '#00FFFF',
            strokeWidth: 12,
            altitudeMode: 'RELATIVE_TO_GROUND',
            coordinates: lineCoords
          });
          map3d.append(routeLine);
        } catch(pe) { console.warn('[ARNav] Route polyline failed:', pe.message); }
      }

      // Glow layer for visibility
      var glowCoords = routeCoords.map(function(c) {
        return { lat: c.lat, lng: c.lng, altitude: 20 };
      });
      try {
        var glowLine = new Polyline3DElement({
          strokeColor: 'rgba(0,170,255,0.3)',
          strokeWidth: 24,
          altitudeMode: 'RELATIVE_TO_GROUND',
          coordinates: glowCoords
        });
        map3d.append(glowLine);
      } catch(ge) {}
    }

    // ── Step 6: Add origin and destination markers ──
    try {
      var originMarker = new Marker3DElement({
        position: { lat: userCoords.lat, lng: userCoords.lng, altitude: 30 },
        altitudeMode: 'RELATIVE_TO_GROUND',
        label: 'You'
      });
      map3d.append(originMarker);
    } catch(me) { console.warn('[ARNav] Origin marker failed:', me.message); }

    try {
      var destMarker = new Marker3DElement({
        position: { lat: destCoords.lat, lng: destCoords.lng, altitude: 30 },
        altitudeMode: 'RELATIVE_TO_GROUND',
        label: destAddr.split(',')[0] || 'Destination'
      });
      map3d.append(destMarker);
    } catch(me) { console.warn('[ARNav] Dest marker failed:', me.message); }

    // ── Step 6b: Add road/highway name labels along route ──
    refreshRoadLabels();

    // ── Done! ──
    clearTimeout(safetyTimer);
    hideLoading();

    // ── Step 7: Background data (non-blocking) ──
    getWeather(destCoords.lat, destCoords.lng).catch(function(){});
    getAQI(destCoords.lat, destCoords.lng).catch(function(){});
    fetchWalkEta(userCoords, destCoords).catch(function(){});

    // Parking
    getParking(destCoords.lat, destCoords.lng).then(function(spots) {
      if (!spots.length) return;
      var parkingEl = document.getElementById('hud-parking');
      var html = '<div class="parking-title">Parking</div>';
      spots.forEach(function(p) {
        html += '<div>🅿 ' + p.name + '</div>';
        try {
          var pm = new Marker3DElement({
            position: { lat: p.lat, lng: p.lng, altitude: 15 },
            altitudeMode: 'RELATIVE_TO_GROUND',
            label: '🅿 ' + p.name
          });
          map3d.append(pm);
        } catch(pme) {}
      });
      parkingEl.innerHTML = html;
    }).catch(function(){});

    // POIs along route
    refreshPOIs();

    // ── Step 8: Cinematic camera settle ──
    try {
      map3d.flyCameraTo({
        endCamera: {
          center: { lat: currentCenter.lat, lng: currentCenter.lng, altitude: 0 },
          range: currentRange,
          heading: currentHeading,
          tilt: currentTilt + 5
        },
        durationMillis: 2500
      });
    } catch(fe) {}

  } catch(e) {
    console.error('[ARNav] init fatal:', e);
    clearTimeout(safetyTimer);
    showFatal('3D Map failed to load:<br>' + (e.message || e));
  }
}

// Google Maps callback
function initMap() { init(); }
window.initMap = initMap;

// Google Maps auth failure callback
window.gm_authFailure = function() {
  console.error('[ARNav] Google Maps AUTH FAILURE');
  showFatal('Google Maps API auth failed.<br><br>Enable <b>Maps JavaScript API</b><br>and <b>Directions API</b><br>in Google Cloud Console.');
};

// Load Google Maps JS with alpha (required for Map3DElement)
(function(){
  if (!apiKey) { showFatal('Google Maps API key missing'); return; }
  var s = document.createElement('script');
  s.src = 'https://maps.googleapis.com/maps/api/js?key=' + encodeURIComponent(apiKey) + '&libraries=places&v=alpha&callback=initMap';
  s.async = true;
  s.defer = true;
  s.onerror = function() { showFatal('Google Maps JS failed to load'); };
  document.head.appendChild(s);
  setTimeout(function(){
    if (!(window.google && window.google.maps)) showFatal('Google Maps JS load timed out');
  }, 15000);
})();

// ── Kill any lingering audio contexts from previous page ──
(function() {
  try {
    document.querySelectorAll('video,audio').forEach(function(v){v.pause();v.muted=true;v.src='';v.remove()});
    if (window.AudioContext) {
      var OrigAC = window.AudioContext;
      window.AudioContext = function() { var ctx = new OrigAC(); ctx.suspend(); return ctx; };
    }
    if (window.webkitAudioContext) {
      var OrigWAC = window.webkitAudioContext;
      window.webkitAudioContext = function() { var ctx = new OrigWAC(); ctx.suspend(); return ctx; };
    }
  } catch(ae) {}
})();

// ── Auto-dismiss Maps alpha developer warning overlay (aggressive) ──
(function() {
  var dismissed = false;

  // Search everywhere for buttons/overlays matching warning patterns
  function nukeWarnings() {
    if (dismissed) return;

    // 1. Find ALL buttons on page - click any that look like dismiss/close/ok
    var allBtns = document.querySelectorAll('button');
    for (var i = 0; i < allBtns.length; i++) {
      var btn = allBtns[i];
      var txt = (btn.textContent || '').trim().toLowerCase();
      var ariaLabel = (btn.getAttribute('aria-label') || '').toLowerCase();
      var cls = (btn.className || '').toLowerCase();
      if (txt === 'dismiss' || txt === 'ok' || txt === 'close' || txt === 'got it' || txt === 'accept' ||
          ariaLabel === 'close' || ariaLabel === 'dismiss' ||
          cls.indexOf('dismiss') !== -1 || cls.indexOf('close') !== -1) {
        console.log('[ARNav] Clicking warning button: "' + txt + '" class=' + cls);
        btn.click();
        dismissed = true;
        return;
      }
    }

    // 2. Find overlays with white/light backgrounds that sit on top (z-index based)
    var allDivs = document.querySelectorAll('div');
    for (var d = 0; d < allDivs.length; d++) {
      var div = allDivs[d];
      var st = div.style;
      var txt = (div.textContent || '').toLowerCase();
      // Check for "development" or "alpha" or "for development purposes" text
      if ((txt.indexOf('development') !== -1 || txt.indexOf('alpha') !== -1 ||
           txt.indexOf('for development purposes') !== -1 || txt.indexOf('developer') !== -1) &&
          txt.length < 500) {
        // This is likely the warning - hide it and click any button inside
        div.style.display = 'none';
        div.style.visibility = 'hidden';
        div.style.opacity = '0';
        div.style.height = '0';
        div.style.overflow = 'hidden';
        div.style.pointerEvents = 'none';
        var innerBtn = div.querySelector('button');
        if (innerBtn) innerBtn.click();
        console.log('[ARNav] Nuked warning div with text containing development/alpha');
        dismissed = true;
        return;
      }
    }

    // 3. Probe shadow DOM of gmp-map-3d
    var map3dEl = document.querySelector('gmp-map-3d');
    if (map3dEl && map3dEl.shadowRoot) {
      var shadowBtns = map3dEl.shadowRoot.querySelectorAll('button');
      for (var sb = 0; sb < shadowBtns.length; sb++) {
        var sbtn = shadowBtns[sb];
        var sbtxt = (sbtn.textContent || '').trim().toLowerCase();
        var sbcls = (sbtn.className || '').toLowerCase();
        if (sbtxt === 'dismiss' || sbtxt === 'ok' || sbtxt === 'close' || sbtxt === 'got it' ||
            sbcls.indexOf('dismiss') !== -1) {
          sbtn.click();
          console.log('[ARNav] Clicked shadow DOM warning button: "' + sbtxt + '"');
          dismissed = true;
          return;
        }
      }
      // Hide any warning-like divs in shadow DOM
      var shadowDivs = map3dEl.shadowRoot.querySelectorAll('div');
      for (var sd = 0; sd < shadowDivs.length; sd++) {
        var sdiv = shadowDivs[sd];
        var sdtxt = (sdiv.textContent || '').toLowerCase();
        if ((sdtxt.indexOf('development') !== -1 || sdtxt.indexOf('alpha') !== -1 ||
             sdtxt.indexOf('developer') !== -1) && sdtxt.length < 500) {
          sdiv.style.display = 'none';
          var sdBtn = sdiv.querySelector('button');
          if (sdBtn) sdBtn.click();
          console.log('[ARNav] Nuked shadow DOM warning div');
          dismissed = true;
          return;
        }
      }
    }

    // 4. Also check iframes
    var iframes = document.querySelectorAll('iframe');
    for (var fi = 0; fi < iframes.length; fi++) {
      try {
        var fdoc = iframes[fi].contentDocument || iframes[fi].contentWindow.document;
        var fbtns = fdoc.querySelectorAll('button');
        for (var fb = 0; fb < fbtns.length; fb++) {
          var fbtxt = (fbtns[fb].textContent || '').trim().toLowerCase();
          if (fbtxt === 'dismiss' || fbtxt === 'ok' || fbtxt === 'close' || fbtxt === 'got it') {
            fbtns[fb].click();
            console.log('[ARNav] Clicked iframe warning button: "' + fbtxt + '"');
            dismissed = true;
            return;
          }
        }
      } catch(ce) {} // cross-origin
    }
  }

  // MutationObserver on body AND gmp-map-3d
  function observeTarget(target) {
    if (!target) return;
    var obs = new MutationObserver(function() {
      setTimeout(nukeWarnings, 50);
      setTimeout(nukeWarnings, 200);
    });
    obs.observe(target, { childList: true, subtree: true });
  }
  observeTarget(document.body);

  // Also observe shadow root when map3d is ready
  var mapWatch = setInterval(function() {
    var m3 = document.querySelector('gmp-map-3d');
    if (m3) {
      if (m3.shadowRoot) { observeTarget(m3.shadowRoot); clearInterval(mapWatch); }
    }
  }, 300);
  setTimeout(function() { clearInterval(mapWatch); }, 15000);

  // Aggressive polling: every 300ms for 30 seconds
  var attempts = 0;
  var interval = setInterval(function() {
    attempts++;
    nukeWarnings();
    if (dismissed || attempts >= 100) clearInterval(interval);
  }, 300);
})();
</script>
